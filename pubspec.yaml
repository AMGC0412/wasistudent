name: wasistudent
description: Vivienda estudiantil verificada en Cusco - Tu hogar estudiantil
version: 13.0.0+13

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Mapa real 100% gratis (OpenStreetMap, sin API key)
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # Geolocalización
  geolocator: ^12.0.0
  geolocator_web: ^4.0.0

  # Persistencia local
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Estado y navegación
  provider: ^6.1.2
  go_router: ^14.2.0

  # UI
  shimmer: ^3.0.0
  fl_chart: ^0.68.0
  photo_view: ^0.15.0
  flutter_staggered_grid_view: ^0.7.0
  smooth_page_indicator: ^1.2.0
  cached_network_image: ^3.3.1

  # Utilidades
  intl: ^0.19.0
  url_launcher: ^6.3.0
  share_plus: ^9.0.0
  image_picker: ^1.1.2
  path: ^1.9.0
  path_provider: ^2.1.5
  uuid: ^4.5.1
  sensors_plus: ^5.0.1
  flutter_local_notifications: ^17.2.1
  timezone: ^0.9.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
